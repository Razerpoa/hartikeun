name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. Extract metadata (tags, labels) for Docker
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/hartikeun
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short
            type=ref,event=pr

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          # 2. Only push on true merges/pushes to main, not on PR test builds
          push: ${{ github.event_name != 'pull_request' }}
          # 3. Use the tags generated by the metadata step
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =================================================================
      # NEW DEPLOYMENT STEPS
      # =================================================================

      # 4. Authenticate with Google Cloud (Only runs on push to main)
      - name: Authenticate to Google Cloud
        if: ${{ github.event_name != 'pull_request' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }} # Create this secret in GitHub

      # 5. Deploy to Cloud Run using GitHub's native short SHA
      - name: Deploy to Cloud Run
        if: ${{ github.event_name != 'pull_request' }}
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: hartikeun
          region: asia-southeast1
          # This forces the exact Docker Hub tag format: username/hartikeun:sha-9450241
          image: ${{ secrets.DOCKERHUB_USERNAME }}/hartikeun:latest
